<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="시니어 디지털 보안관 - 안전하게 검색하세요">
  <title>🛡️ 시니어 디지털 보안관</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================
       1단계: 큰 검색 영역 (초기 화면)
       ============================================ -->
  <div id="search-view" class="view">
    <header class="hero-header">
      <div class="logo-large" aria-hidden="true">🛡️</div>
      <h1 class="app-title">시니어 디지털 보안관</h1>
      <p class="app-subtitle">안전하게 검색하세요</p>
    </header>

    <div class="search-main">
      <form id="search-form" class="search-form" role="search" aria-label="안전 검색">
        <label for="search-input" class="search-label">무엇을 찾고 계신가요?</label>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="예: 건강 정보, 요리 레시피"
          autocomplete="off"
          required
          aria-required="true"
        >
        <button type="submit" class="search-button">
          🔍 안전하게 검색하기
        </button>
      </form>
    </div>

    <footer class="search-footer">
      <p>60세 이상 어르신을 위한 안전한 디지털 검색 서비스입니다.</p>
    </footer>
  </div>

  <!-- ============================================
       2단계: 축소 헤더 (검색 후 표시)
       ============================================ -->
  <div id="result-view" class="view hidden">
    <header class="result-header">
      <div class="result-header-left">
        <span class="logo-small" aria-hidden="true">🛡️</span>
        <span class="header-title">시니어 디지털 보안관</span>
      </div>
      <form id="result-search-form" class="result-search-form" role="search" aria-label="결과 화면 검색">
        <input
          type="search"
          id="result-search-input"
          class="result-search-input"
          placeholder="다시 검색하기"
          aria-label="검색어 입력"
        >
        <button type="submit" class="result-search-button" aria-label="검색">🔍</button>
      </form>
    </header>
  </div>

  <!-- ============================================
       3열 메인 콘텐츠 (첫 화면부터 항상 표시)
       ============================================ -->
  <main class="result-grid">
    <!-- 열 1: 안심 유튜브 -->
    <section id="col-youtube" class="result-column" aria-labelledby="youtube-heading">
      <h2 id="youtube-heading" class="column-heading">📺 안심 유튜브</h2>
      <div id="youtube-content" class="column-content">
        <!-- script.js에서 초기 안내 또는 검색 결과 렌더링 -->
      </div>
    </section>

    <!-- 열 2: 신뢰할 수 있는 뉴스 -->
    <section id="col-news" class="result-column" aria-labelledby="news-heading">
      <h2 id="news-heading" class="column-heading">📰 신뢰할 수 있는 뉴스</h2>
      <div id="news-content" class="column-content">
        <!-- script.js에서 더미 데이터로 렌더링 -->
      </div>
    </section>

    <!-- 열 3: 생활 정보 + AI 챗봇 -->
    <section id="col-info" class="result-column" aria-labelledby="info-heading">
      <h2 id="info-heading" class="column-heading">🌱 생활 정보</h2>
      <div id="info-content" class="column-content">
        <!-- script.js에서 더미 데이터로 렌더링 -->
      </div>

      <h2 class="column-heading chatbot-heading">🤖 보안관 AI 챗봇</h2>
      <div id="chatbot-container" class="chatbot-container">
        <p class="chatbot-desc">문자·카톡으로 받은 의심스러운 메시지를 붙여넣어 주세요.</p>
        <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
        <form id="chat-form" class="chat-form">
          <label for="chat-input" class="visually-hidden">메시지 입력</label>
          <textarea
            id="chat-input"
            class="chat-input"
            rows="3"
            placeholder="의심스러운 문자 내용을 여기에 붙여넣기..."
          ></textarea>
          <button type="submit" class="chat-submit-button">🔍 안전 확인하기</button>
        </form>
      </div>
    </section>
  </main>

  <!-- Supabase JS CDN (마지막 연동 단계에서 사용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="script.js" defer></script>
</body>
</html>

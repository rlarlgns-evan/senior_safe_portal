<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="시니어 디지털 보안관 - 링크 스미싱 분석" />
  <title>시니어 디지털 보안관 | 링크 안전 검사</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="input-view" class="view-card" aria-labelledby="input-title">
      <h1 id="input-title" class="main-title">🛡️ 시니어 디지털 보안관</h1>
      <p class="sub-title">링크 스미싱/사기 여부를 쉽게 확인하세요.</p>

      <form id="analyze-form" class="analyze-form" novalidate>
        <label for="url-input" class="static-label">의심되는 인터넷 주소(링크)를 붙여넣으세요.</label>
        <input
          id="url-input"
          class="url-input"
          type="url"
          inputmode="url"
          autocomplete="off"
          aria-describedby="input-help"
          placeholder="https://example.com"
        />
        <p id="input-help" class="help-text">문자나 카카오톡에서 받은 링크를 그대로 붙여넣어도 됩니다.</p>
        <button type="submit" class="primary-button">안전 검사 시작</button>
      </form>
    </section>

    <section id="result-view" class="view-card hidden" aria-labelledby="result-title">
      <button id="back-button" class="back-button" type="button">⬅ 처음으로 돌아가기</button>
      <h2 id="result-title" class="result-title">분석 결과</h2>
      <div id="verdict-container" class="verdict-container" aria-live="polite"></div>
    </section>
  </main>

  <div id="loading-overlay" class="loading-overlay hidden" role="dialog" aria-modal="true" aria-live="assertive">
    <div class="loading-box">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p>링크의 안전성을 확인하고 있습니다. 잠시만 기다려주세요...</p>
    </div>
  </div>

  <div id="error-box" class="error-box hidden" role="alert">
    <div class="error-content">
      <p id="error-message"></p>
      <button id="error-close" type="button" class="error-close" aria-label="오류 닫기">X</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>

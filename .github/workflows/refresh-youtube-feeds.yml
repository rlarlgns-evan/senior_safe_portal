# GitHub Actions: 유튜브 추천 영상 자동 수집
# KST 09:00 · 15:00 · 21:00 (하루 3회) + 수동 실행 가능

name: Refresh YouTube Feeds

on:
  schedule:
    # UTC — KST+9: 09:00, 15:00, 21:00
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh youtube_feeds via Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/refresh-youtube-feeds.mjs

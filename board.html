<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자유게시판 - 시니어 디지털 보안관</title>
  <link rel="stylesheet" href="style.css?v=20260818" />
  <link rel="stylesheet" href="style-desktop.css?v=20260818" media="(min-width: 1024px)" />
  <link rel="stylesheet" href="style-mobile.css?v=20260818" media="(max-width: 1023px)" />
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="board-page" data-nav="board" data-page="board">

  <div id="app-container" class="app-layout">
    <header class="site-header"></header>

    <main class="board-main">
      <h1 class="board-page-title">자유게시판</h1>
      <hr class="board-title-rule" />

      <div class="board-list-toolbar">
        <p id="board-auth-hint" class="board-auth-hint">글을 쓰려면 우측 상단에서 로그인해 주세요.</p>
        <button type="button" id="board-write-btn" class="board-write-btn btn btn--primary">글쓰기</button>
      </div>

      <div id="board-status" class="board-status hidden" aria-live="polite"></div>

      <section id="board-compose" class="board-compose hidden" aria-labelledby="board-compose-title">
        <h2 id="board-compose-title" class="board-compose-title">글쓰기</h2>
        <form id="board-form" class="board-form">
          <label for="board-name-input" class="form-label">이름</label>
          <input id="board-name-input" type="text" class="modal-input" maxlength="32" required aria-label="이름" />
          <label for="board-title-input" class="form-label">제목</label>
          <input id="board-title-input" type="text" class="modal-input" maxlength="100" required aria-label="제목" />
          <label for="board-content-input" class="form-label">내용</label>
          <textarea id="board-content-input" class="board-textarea" maxlength="2000" rows="8" required aria-label="내용"></textarea>
          <div id="board-form-error" class="login-error alert-persistent hidden" role="alertdialog" aria-modal="true" aria-labelledby="board-form-error-message">
            <p id="board-form-error-message"></p>
            <button type="button" id="board-form-error-close" class="btn btn--danger">닫기</button>
          </div>
          <div class="board-form-actions">
            <button type="button" id="board-compose-cancel" class="btn btn--secondary">취소</button>
            <button type="submit" class="btn btn--primary">등록</button>
          </div>
        </form>
      </section>

      <section id="board-detail" class="board-detail hidden" aria-labelledby="board-detail-title">
        <div class="board-detail-header">
          <h2 id="board-detail-title" class="board-detail-title"></h2>
          <dl class="board-detail-meta"></dl>
        </div>
        <div id="board-detail-body" class="board-detail-body"></div>
        <div class="board-detail-actions">
          <button type="button" id="board-detail-back" class="btn btn--secondary">목록으로</button>
          <button type="button" id="board-detail-delete" class="btn btn--danger hidden">삭제</button>
        </div>
      </section>

      <div id="board-list-view" class="board-list-view">
        <div class="board-table-wrap">
          <table class="board-table" aria-label="게시글 목록">
            <thead>
              <tr>
                <th scope="col" class="col-no">번호</th>
                <th scope="col" class="col-title">제목</th>
                <th scope="col" class="col-name">이름</th>
                <th scope="col" class="col-id">아이디</th>
                <th scope="col" class="col-date">작성일</th>
                <th scope="col" class="col-views">조회수</th>
              </tr>
            </thead>
            <tbody id="board-table-body">
              <tr>
                <td colspan="6" class="board-table-empty">게시글을 불러오고 있습니다...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <nav id="board-pagination" class="board-pagination" aria-label="게시판 페이지">
          <button type="button" id="board-prev" class="board-page-btn" disabled>이전</button>
          <span id="board-page-info" class="board-page-info">1 page / 1 pages</span>
          <button type="button" id="board-next" class="board-page-btn" disabled>다음</button>
        </nav>

        <div class="board-search-bar">
          <form id="board-search-form" class="search-form search-form--board" role="search">
            <label for="board-search-input" class="form-label">게시글 검색</label>
            <div class="search-row">
              <span class="search-mark" aria-hidden="true">
                <span class="material-symbols-outlined search-mark-icon">forum</span>
              </span>
              <input
                id="board-search-input"
                type="search"
                class="search-input"
                autocomplete="off"
                aria-label="게시글 검색"
              />
              <button type="submit" class="search-submit-chip" aria-label="게시글 검색">
                <span class="material-symbols-outlined" aria-hidden="true">search</span>
                <span class="search-submit-label">검색</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/sheriff-core.js?v=20260816"></script>
  <script src="js/pages/board.js"></script>
  <script src="js/bootstrap.js"></script>
</body>
</html>

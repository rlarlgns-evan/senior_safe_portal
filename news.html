<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스 전체 보기 - 시니어 디지털 보안관</title>
  <link rel="stylesheet" href="style.css?v=20260806" />
  <link rel="stylesheet" href="style-desktop.css?v=20260806" media="(min-width: 1024px)" />
  <link rel="stylesheet" href="style-mobile.css?v=20260806" media="(max-width: 1023px)" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="browse-page" data-browse="news" data-nav="news" data-page="browse">

  <div id="app-container" class="app-layout">
    <header class="site-header"></header>

    <main class="browse-main">
      <a class="browse-back" href="index.html#news-section">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        홈으로 돌아가기
      </a>
      <div class="browse-header">
        <img src="assets/mascot-sheriff.png" alt="" class="browse-header-mascot" width="72" height="72" />
        <div class="browse-header-text">
          <h1 class="browse-title">
            <span class="material-symbols-outlined section-icon" aria-hidden="true">newspaper</span>
            뉴스 전체 보기
          </h1>
          <p class="browse-subtitle">오늘의 신뢰 뉴스를 더 많이 볼 수 있습니다</p>
        </div>
      </div>
      <div id="browse-categories" class="category-tabs browse-category-tabs" role="tablist" aria-label="뉴스 카테고리"></div>
      <div id="browse-content" class="browse-content">
        <p class="youtube-loading">뉴스를 불러오고 있습니다...</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/sheriff-core.js?v=20260806"></script>
  <script src="js/pages/browse.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/bootstrap.js"></script>
</body>
</html>
